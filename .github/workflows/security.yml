name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trivy-scan:
    name: Scan d'image conteneur (Trivy)
    runs-on: ubuntu-latest

    steps:
      # TODO 1 — Récupérer le code source du dépôt
      # Indice : action officielle GitHub "actions/checkout"
      - name: Checkout repository
        uses: actions/checkout@v6

      # TODO 2 — Construire l'image Docker locale
      # Indice : commande "docker build", taguée "vulnerable-api"
      - name: Build Docker image
        run: docker build -t vulnerable-api .

      # TODO 3 — Installer Trivy sur le runner
      # Indice : action officielle Aqua Security "aquasecurity/trivy-action" n'existe pas pour ça.
      #          Cherchez comment installer trivy via un step "run:" avec curl.
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # TODO 4 — Lancer Trivy contre l'image construite
      # Objectif : faire échouer le job si des CVE HIGH ou CRITICAL sont détectées
      # Indice : consultez "trivy image --help" pour les flags utiles
      - name: Run Trivy scan
        run: trivy image --severity HIGH,CRITICAL --exit-code 1 vulnerable-api

      # TODO 5 — (Bonus) Publier le rapport Trivy en artefact GitHub Actions
      # Indice : "actions/upload-artifact"
      - name: Upload Trivy report
        if: failure() # Only upload if the scan fails
        uses: actions/upload-artifact@v3
        with:
          name: trivy-report